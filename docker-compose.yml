# =====================================================================
# docker-compose.yml — RISK METER DASHBOARD
#
# Orquesta el backend (FastAPI) y el frontend (Streamlit).
#
# GUIA RAPIDA:
#   docker-compose up -d          # Arranca todo en segundo plano
#   docker-compose logs -f        # Ver logs en tiempo real
#   docker-compose down           # Detiene y elimina contenedores
#   docker-compose build          # Reconstruye imagenes
#
# ACCESOS:
#   Backend API:  http://localhost:8000
# ACCESOS:
#   Backend y Dashboard: http://localhost:8000
#   Swagger /docs:       http://localhost:8000/docs
# =====================================================================

version: "3.9"

services:

  # ══════════════════════════════════════════════
  # SERVICIO 1: Backend FastAPI
  # ══════════════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: risk_meter_backend
    ports:
      - "8000:8000"       # Puerto local:Puerto contenedor
    env_file:
      - ./backend/.env    # Carga API keys y configuracion
    volumes:
      # Hot-reload: cambios en backend/ se reflejan sin rebuild
      - ./backend:/app
      # Preserva __pycache__ dentro del contenedor (mejor rendimiento)
      - /app/__pycache__
    networks:
      - risklab-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s



# ══════════════════════════════════════════════
# RED INTERNA
# ══════════════════════════════════════════════
networks:
  risklab-net:
    # Red bridge privada: los contenedores se ven entre si
    # pero estan aislados del exterior (excepto por los ports publicados)
    driver: bridge
