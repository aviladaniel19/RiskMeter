<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RISK METER DASHBOARD — Dashboard de Riesgo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #05080f;
      color: #ffffff;
      min-height: 100vh
    }

    .shell {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.5rem
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid #16202e;
      margin-bottom: 1.5rem
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-end
    }

    .header-left h1 {
      font-size: 18px;
      font-weight: 600;
      color: #f1f5f9;
      letter-spacing: .02em
    }

    .header-left p {
      font-size: 12px;
      color: #64748b;
      margin-top: 3px
    }

    .ts {
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #475569;
      text-align: right
    }

    .form-panel {
      background: #0b121d;
      border: 1px solid #16202e;
      border-radius: 12px;
      padding: 1rem;
      display: flex;
      gap: 15px;
      align-items: flex-end
    }

    .form-grp {
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .form-grp label {
      font-size: 11px;
      color: #cbd5e1;
      text-transform: uppercase;
      letter-spacing: .06em
    }

    .form-input {
      padding: 8px;
      background: #05080f;
      border: 1px solid #1e293b;
      color: #f1f5f9;
      border-radius: 8px;
      font-size: 13px;
      font-family: 'SF Mono', monospace
    }

    .btn-analizar {
      padding: 9px 18px;
      background: #22d3ee;
      color: #05080f;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
      box-shadow: 0 0 15px rgba(34, 211, 238, 0.2)
    }

    .btn-analizar:hover {
      opacity: .8;
      transform: translateY(-1px);
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.3)
    }

    .btn-analizar:disabled {
      background: #475569;
      cursor: not-allowed
    }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #16202e;
      margin-bottom: 1.5rem
    }

    .tab {
      padding: 9px 18px;
      font-size: 13px;
      background: transparent;
      border: 0;
      border-bottom: 2px solid transparent;
      color: #cbd5e1;
      cursor: pointer;
      transition: all .15s;
      letter-spacing: .01em
    }

    .tab:hover {
      color: #94a3b8;
      background: rgba(255, 255, 255, .03)
    }

    .tab.act {
      color: #22d3ee;
      border-bottom-color: #22d3ee;
      font-weight: 600
    }

    .g4 {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 1.25rem
    }

    .g3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 1.25rem
    }

    .g2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 1.25rem
    }

    .mc {
      background: #0b121d;
      border: 1px solid #16202e;
      border-radius: 12px;
      padding: 1.1rem;
      transition: all .2s;
    }

    .ml {
      font-size: 11px;
      font-weight: 700;
      color: #94a3b8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .mv {
      font-size: 24px;
      font-weight: 700;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      margin-bottom: 2px;
    }

    .ms {
      font-size: 11px;
      color: #22d3ee;
      margin-top: 3px;
      opacity: .7
    }

    .card {
      background: #0b121d;
      border: 1px solid #16202e;
      border-radius: 12px;
      padding: 1.1rem 1.25rem;
      margin-bottom: 1.25rem
    }

    .ct {
      font-size: 11px;
      font-weight: 600;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 14px
    }

    .ht {
      width: 100%;
      border-collapse: collapse
    }

    .ht th,
    .ht td {
      padding: 8px 12px;
      font-size: 12px;
      text-align: center;
    }

    /* Opción C: Colores Sólidos Vibrantes por tarjeta */
    .mc:nth-child(1) { border-color: #22d3ee; }
    .mc:nth-child(1) .mv { color: #22d3ee; }
    .mc:nth-child(1) .ml { color: #22d3ee; }

    .mc:nth-child(2) { border-color: #818cf8; }
    .mc:nth-child(2) .mv { color: #818cf8; }
    .mc:nth-child(2) .ml { color: #818cf8; }

    .mc:nth-child(3) { border-color: #fbbf24; }
    .mc:nth-child(3) .mv { color: #fbbf24; }
    .mc:nth-child(3) .ml { color: #fbbf24; }

    .mc:nth-child(4) { border-color: #3dd32c; }
    .mc:nth-child(4) .mv { color: #3dd32c; }
    .mc:nth-child(4) .ml { color: #3dd32c; }

    /* Estilos para Composición Manual */
    .act-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .act-card {
      background: #05080f;
      border: 1px solid #16202e;
      border-radius: 12px;
      padding: 12px;
      transition: all .2s;
    }

    .act-card:focus-within {
      border-color: #3b82f6;
    }

    .w-input {
      background: #1e2435;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #f1f5f9;
      font-family: 'SF Mono', monospace;
      font-size: 16px;
      font-weight: 600;
      padding: 6px 8px;
      width: 100%;
      text-align: right;
      outline: none;
    }

    .w-input:focus {
      border-color: #3b82f6;
      background: #242b3d;
    }

    .sum-bar-container {
      background: #1e2435;
      border-radius: 20px;
      height: 8px;
      width: 100%;
      overflow: hidden;
      margin: 15px 0;
    }

    .sum-bar-fill {
      height: 100%;
      transition: width .3s, background-color .3s;
    }

    .btn-apply {
      background: #22d3ee;
      color: #05080f;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-apply:hover {
      background: #06b6d4;
      transform: translateY(-1px);
    }

    .btn-apply:disabled {
      background: #1e2435;
      color: #64748b;
      cursor: not-allowed;
    }

    .ht th {
      color: #64748b;
      font-weight: 500;
      text-align: center;
    }

    .ht td:first-child {
      text-align: center;
      font-weight: 500;
      color: #e2e8f0
    }

    .ht tr:last-child td {
      border-bottom: 0
    }

    .sig {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 5px;
      font-weight: 600;
      letter-spacing: .03em
    }

    .sb {
      background: rgba(61, 211, 44, .15);
      color: #3dd32c
    }

    .ss {
      background: rgba(239, 68, 68, .15);
      color: #f87171
    }

    .sn {
      background: rgba(100, 116, 139, .12);
      color: #94a3b8
    }

    .srow {
      display: grid;
      grid-template-columns: 88px repeat(4, 1fr);
      gap: 6px;
      align-items: center
    }

    .srow-cell {
      text-align: center;
      padding: 9px 4px;
      border-top: 1px solid #1e2435
    }

    .srow-name {
      font-size: 13px;
      font-weight: 600;
      padding: 9px 4px;
      border-top: 1px solid #1e2435;
      color: #e2e8f0
    }

    .srow-hdr {
      font-size: 11px;
      font-weight: 500;
      color: #64748b;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding-bottom: 8px
    }

    .srow-hdr:first-child {
      text-align: left
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', monospace
    }

    .bar-track {
      height: 5px;
      background: #1e2435;
      border-radius: 3px;
      flex: 1
    }

    .bar-fill {
      height: 5px;
      border-radius: 3px
    }

    .sel-dd {
      padding: 6px 10px;
      background: #0f1117;
      border: 1px solid #1e2435;
      color: #e2e8f0;
      border-radius: 6px;
      font-size: 12px;
      font-family: 'SF Mono', monospace;
      margin-bottom: 10px
    }

    @media(max-width:700px) {

      .g4,
      .g3 {
        grid-template-columns: repeat(2, 1fr)
      }

      .g2 {
        grid-template-columns: 1fr
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <div class="header">
      <div class="header-top">
        <div class="header-left">
          <h1>RISK METER DASHBOARD</h1>
          <p>Dashboard Interactivo de Riesgo Financiero &nbsp;·&nbsp; Daniel Avila Otalora - Jhon Alexander Ocampo Gómez
          </p>
        </div>
        <div class="ts" id="ts">Esperando datos...</div>
      </div>
      <div class="form-panel">
        <div class="form-grp" style="flex:2">
          <label>Tickers (separados por coma)</label>
          <input type="text" id="inp-tickers" class="form-input" value="AAPL, MSFT, GOOGL, AMZN, TSLA">
        </div>
        <div class="form-grp" style="flex:1">
          <label>Benchmark</label>
          <select id="inp-bench" class="form-input" style="font-family:inherit">
            <option value="^GSPC">S&P 500 (^GSPC)</option>
            <option value="^DJI">Dow Jones (^DJI)</option>
            <option value="^IXIC">NASDAQ (^IXIC)</option>
          </select>
        </div>
        <div class="form-grp" style="flex:1">
          <label>Período</label>
          <select id="inp-per" class="form-input" style="font-family:inherit">
            <option value="1y">1 Año</option>
            <option value="2y" selected>2 Años</option>
            <option value="5y">5 Años</option>
          </select>
        </div>
        <div class="form-grp">
          <button id="btn-analizar" class="btn-analizar" onclick="loadData()">Analizar</button>
        </div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab act" onclick="sw('perf',this)">Rendimiento</button>
      <button class="tab" onclick="sw('sig',this)">Señales</button>
      <button class="tab" onclick="sw('risk',this)">Riesgo</button>
      <button class="tab" onclick="sw('vol',this)">Volatilidad</button>
      <button class="tab" onclick="sw('optim',this)">Optimización</button>
      <button class="tab" onclick="sw('fixed',this)">Renta Fija</button>
      <button class="tab" onclick="sw('deriv',this)">Derivados</button>
      <button class="tab" onclick="sw('ml',this)">IA Predictiva</button>
    </div>

    <div id="s-perf"></div>
    <div id="s-sig" style="display:none"></div>
    <div id="s-risk" style="display:none"></div>
    <div id="s-vol" style="display:none"></div>
    <div id="s-optim" style="display:none"></div>
    <div id="s-fixed" style="display:none"></div>
    <div id="s-deriv" style="display:none"></div>
    <div id="s-ml" style="display:none"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <script>
    /* ── GLOBAL STATE ─────────────────────────────────── */
    let GLOBAL = null;
    let charts = {};

    /* ── UTILS ────────────────────────────────────────── */
    const pct = (v, d = 2) => (v * 100).toFixed(d) + '%';
    const pctS = (v, d = 2) => (v >= 0 ? '+' : '') + pct(v, d);
    const f1 = v => v.toFixed(1), f2 = v => v.toFixed(2), f3 = v => v.toFixed(3);
    const tc = '#cbd5e1', gc = 'rgba(255,255,255,.05)';
    const axBase = { grid: { color: gc }, ticks: { color: tc, font: { size: 11, family: "'Inter', sans-serif" } } };
    const CLRS = ['#22d3ee', '#818cf8', '#fbbf24', '#3dd32c', '#f472b6', '#a78bfa', '#fb923c', '#3dd32c'];
    const sigCls = s => s.includes('COMPRA') ? 'sb' : s.includes('VENDE') ? 'ss' : 'sn';
    function regCh(id, c) { if (charts[id]) charts[id].destroy(); charts[id] = new Chart(id, c) }
    const step = a => { const s = Math.ceil(a.length / 120); return a.filter((_, i) => i % s === 0) };

    /* Escala de colores Viridis: Morado oscuro -> Azul -> Verde -> Amarillo */
    function sharpeColor(sr, minSr, maxSr) {
      let t = maxSr === minSr ? 0.5 : (sr - minSr) / (maxSr - minSr);
      t = Math.max(0, Math.min(1, t));
      // Paleta Viridis de 5 paradas
      const stops = [
        [68,  1,   84],   // t=0.00 morado oscuro
        [59,  82,  139],  // t=0.25 azul
        [33,  145, 140],  // t=0.50 teal
        [94,  201, 98],   // t=0.75 verde
        [253, 231, 37]    // t=1.00 amarillo
      ];
      const seg = t * (stops.length - 1);
      const lo = Math.floor(seg), hi = Math.min(lo + 1, stops.length - 1);
      const f = seg - lo;
      const r = Math.round(stops[lo][0] + f * (stops[hi][0] - stops[lo][0]));
      const g = Math.round(stops[lo][1] + f * (stops[hi][1] - stops[lo][1]));
      const b = Math.round(stops[lo][2] + f * (stops[hi][2] - stops[lo][2]));
      return `rgba(${r},${g},${b},0.85)`;
    }

    /* ── API CALLS ────────────────────────────────────── */
    async function api(path, p = {}, method = 'GET', body = null, signal = null) {
      let url = new URL(path, window.location.origin);
      Object.keys(p).forEach(k => url.searchParams.append(k, p[k]));
      let opt = { method, headers: { 'Content-Type': 'application/json' } };
      if (body) opt.body = JSON.stringify(body);
      if (signal) opt.signal = signal;
      let res = await fetch(url, opt);
      if (!res.ok) throw new Error(`API ${res.status}: ` + (await res.text()).slice(0, 200));
      return await res.json();
    }

    async function loadData() {
      const btn = document.getElementById('btn-analizar');
      const ts = document.getElementById('ts');
      btn.innerText = "Calculando..."; btn.disabled = true;
      ts.innerHTML = "Preparando consulta...";
      try {
        const rawT = document.getElementById('inp-tickers').value.split(',').map(s => s.trim().toUpperCase()).filter(s => s);
        if (rawT.length < 2) throw new Error("Mínimo 2 tickers requeridos");
        const per = document.getElementById('inp-per').value;
        let w = rawT.map(() => parseFloat((1.0 / rawT.length).toFixed(4)));
        w[0] += (1.0 - w.reduce((a, b) => a + b, 0));

        // Fase 1: Endpoints de portafolio (secuenciales para no saturar Yahoo Finance)
        ts.innerHTML = "[1/4] Calculando CAPM y rendimiento vs benchmark...";
        const capm = await api('/capm', { tickers: rawT.join(','), periodo: per });

        ts.innerHTML = "[2/4] Calculando VaR, CVaR y frontera eficiente...";
        const macro = await api('/macro', { tickers: rawT.join(','), pesos: w.join(','), periodo: per });
        const varData = await api('/var', {}, 'POST', { tickers: rawT, pesos: w, nivel_confianza: 0.95, periodo: per });
        const front = await api('/frontera-eficiente', {}, 'POST', { tickers: rawT, pesos: w, nivel_confianza: 0.95, periodo: per });

        // Fase 2: Endpoints individuales por ticker (secuenciales)
        ts.innerHTML = "[3/4] Descargando precios, rendimientos e indicadores...";
        let rends = [], ind = [], precios = [];
        for (let i = 0; i < rawT.length; i++) {
          ts.innerHTML = `[3/4] Procesando ${rawT[i]} (${i + 1}/${rawT.length})...`;
          rends.push(await api(`/rendimientos/${rawT[i]}`, { periodo: per }));
          ind.push(await api(`/indicadores/${rawT[i]}`, { periodo: per }));
          precios.push(await api(`/precios/${rawT[i]}`, { periodo: per }));
        }

        // Fase 3: Alertas + GARCH + Benchmark
        ts.innerHTML = "[4/5] Generando señales técnicas y datos de benchmark...";
        const alertas = await api('/alertas', { tickers: rawT.join(','), periodo: per });
        let garch = null;
        let benchRends = null;
        try { garch = await api(`/garch/${rawT[0]}`, { periodo: per }) } catch (e) { console.warn('GARCH:', e.message); }
        try { benchRends = await api(`/rendimientos/${encodeURIComponent(capm.benchmark)}`, { periodo: per }) } catch (e) { console.warn('Benchmark rends:', e.message); }

        // Fase 4: Nuevos Módulos (Renta Fija)
        ts.innerHTML = "[5/5] Descargando curva de renta fija (Nelson-Siegel)...";
        let fixed = null;
        try { fixed = await api('/renta-fija/curva') } catch (e) { console.warn('Renta Fija:', e.message); }

        GLOBAL = { 
          tickers: rawT, 
          pesos: w, 
          capm, 
          macro, 
          alertas, 
          varData, 
          front, 
          rends, 
          ind, 
          precios, 
          garch, 
          volData: {}, 
          benchRends,
          fixed
        };
        ts.innerHTML = `<span style="color:#10b981">●</span> Sincronizado &nbsp;·&nbsp; ${new Date().toLocaleTimeString('es-CO')}`;
        let act = document.querySelector('.tab.act');
        if (act) sw(act.getAttribute('onclick').match(/'([^']+)'/)[1], act);
      } catch (err) {
        console.error(err);
        let msg = err.message;
        if (msg.includes("Yahoo Finance")) {
          msg += " (Probable bloqueo temporal de IP. Intenta usar una VPN o espera 2-5 minutos).";
        }
        ts.innerHTML = `<span style="color:#f87171">Error: ${msg}</span>`;
      } finally {
        btn.innerText = "Analizar"; btn.disabled = false;
      }
    }

    function validarPesos() {
      const inputs = document.querySelectorAll('.w-input');
      let total = 0;
      inputs.forEach(i => total += (parseFloat(i.value) || 0));

      const valEl = document.getElementById('sum-val');
      const barEl = document.getElementById('sum-bar');
      const btnEl = document.getElementById('btn-aplicar');

      if (valEl) valEl.innerText = total.toFixed(1);
      if (barEl) {
        barEl.style.width = Math.min(total, 100) + '%';
        barEl.style.backgroundColor = total > 100.1 ? '#ef4444' : (total > 99.9 ? '#3dd32c' : '#3b82f6');
      }
      if (btnEl) btnEl.disabled = total > 100.1;
    }

    async function aplicarPesos() {
      const inputs = document.querySelectorAll('.w-input');
      let vals = Array.from(inputs).map(i => parseFloat(i.value) || 0);
      let total = vals.reduce((a, b) => a + b, 0);

      // Auto-completar/Normalizar si es necesario
      if (total > 0 && total < 100) {
        vals = vals.map(v => (v / total));
      } else {
        vals = vals.map(v => v / 100);
      }

      GLOBAL.pesos = vals;
      const ts = document.getElementById('ts');
      ts.style.display = 'block';
      ts.innerText = "Recalculando métricas con nuevos pesos...";

      try {
        const tickersArr = GLOBAL.tickers;
        const tickersStr = tickersArr.join(',');
        const per = document.getElementById('inp-per').value;
        const pesosStr = vals.map(v => v.toFixed(4)).join(',');

        // /var y /frontera-eficiente son POST con body JSON
        const [macro, varData, front] = await Promise.all([
          api('/macro', { tickers: tickersStr, pesos: pesosStr, periodo: per }),
          api('/var', {}, 'POST', { tickers: tickersArr, pesos: vals, nivel_confianza: 0.95, periodo: per }),
          api('/frontera-eficiente', {}, 'POST', { tickers: tickersArr, pesos: vals, nivel_confianza: 0.95, periodo: per })
        ]);

        GLOBAL.macro = macro;
        GLOBAL.varData = varData;
        GLOBAL.front = front;

        // Limpiar caché de volatilidad ya que el portafolio cambió (opcional, pero mejor refrescar vistas)
        renderPerf();
        renderRisk();
        renderOptim();
        ts.style.display = 'none';
      } catch (e) {
        ts.innerText = "Error recalculando: " + e.message;
        setTimeout(() => ts.style.display = 'none', 3000);
      }
    }

    function resetearPesos() {
      if (!GLOBAL) return;
      const inputs = document.querySelectorAll('.w-input');
      const n = inputs.length;
      if (n === 0) return;

      // Peso igualitario: 100/n redondeado a 1 decimal
      const pesoIgual = parseFloat((100 / n).toFixed(1));
      // El último absorbe el residuo para que sumen exactamente 100
      const residuo = parseFloat((100 - pesoIgual * (n - 1)).toFixed(1));

      inputs.forEach((inp, i) => {
        inp.value = (i === n - 1) ? residuo : pesoIgual;
      });

      // Feedback visual: destella la barra de suma
      validarPesos();
      const bar = document.getElementById('sum-bar');
      if (bar) {
        bar.style.transition = 'none';
        bar.style.opacity = '0.3';
        setTimeout(() => {
          bar.style.transition = 'width .3s, background-color .3s, opacity .3s';
          bar.style.opacity = '1';
        }, 80);
      }
    }

    // Funciones dinámicas MA
    function calcSMA(data, period) {
      return data.map((val, i, arr) => {
        if (i < period - 1) return null;
        let sum = 0;
        for (let j = 0; j < period; j++) sum += arr[i - j];
        return sum / period;
      });
    }

    function calcEMA(data, period) {
      if (data.length === 0) return [];
      const k = 2 / (period + 1);
      let emaArr = new Array(data.length).fill(null);
      let initialSmaSum = 0;

      // Seed con SMA
      for (let i = 0; i < Math.min(period, data.length); i++) {
        initialSmaSum += data[i];
      }
      if (data.length >= period) {
        emaArr[period - 1] = initialSmaSum / period;
      }

      for (let i = period; i < data.length; i++) {
        emaArr[i] = (data[i] - emaArr[i - 1]) * k + emaArr[i - 1];
      }
      return emaArr;
    }

      benchRends.forEach(r => benchMap[r.fecha] = r.rendimiento_log * 100);

           dataPoints.push({ x: benchMap[r.fecha], y: r.rendimiento_log * 100 });

      let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0, n = dataPoints.length;

      dataPoints.forEach(p => { sumX += p.x; sumY += p.y; sumXY += p.x * p.y; sumX2 += p.x * p.x; });

      const minX = Math.min(...dataPoints.map(p => p.x));
      const maxX = Math.max(...dataPoints.map(p => p.x));
      const lineData = [
         { x: minX, y: m * minX + b },
         { x: maxX, y: m * maxX + b }
      ];

      regCh('c-capm', {
        type: 'scatter',

      const sorted = [...pts].sort((a, b) => a.volatilidad - b.volatilidad);
      const buckets = 30;

          let data = GLOBAL.ind[i].indicadores.slice(-rsiLen).map(x => x.rsi_14 || 50);

      ['perf', 'risk', 'optim', 'sig', 'vol', 'fixed', 'deriv', 'ml'].forEach(n => {

    /* ══ E. VOLATILIDAD ════════════════════════════════════ */
    async function loadVolData(tickerIdx) {
      if (!GLOBAL) return null;
      const t = GLOBAL.tickers[tickerIdx];
      const per = document.getElementById('inp-per').value;
      if (GLOBAL.volData[t] && !GLOBAL.volData[t].error) return GLOBAL.volData[t];

      try {
        const data = await api(`/volatilidad/${t}`, { periodo: per });
        if (data.error) throw new Error(data.message || "Error desconocido");
        GLOBAL.volData[t] = data;
        return data;
      } catch (e) {
        console.error('Volatilidad error:', e);
        const errObj = { error: true, message: e.message || "Error al conectar con el servidor" };
        GLOBAL.volData[t] = errObj;
        return errObj;
      }
    }

      regCh('c-stdres', {
        type: 'line', data: {
          labels: rS.map(x => x.fecha), datasets: [{
            label: 'z(t)', data: rS.map(x => x.valor), borderColor: '#a78bfa', borderWidth: 1, pointRadius: 0, fill: false, tension: .2
          }]
        }, options: {
          responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
          scales: { x: { ...axBase, ticks: { ...axBase.ticks, maxTicksLimit: 8 } }, y: { ...axBase } }
        }
      });
    }

    /* ══ F. RENTA FIJA (Nelson-Siegel) ════════════════════ */
    function renderFixed() {
      if (!GLOBAL) return;
      const el = document.getElementById('s-fixed');
      const f = GLOBAL.fixed;

      if (!f || f.error || !f.nelson_siegel) {
        el.innerHTML = `<div class="card" style="text-align:center;padding:50px;color:#94a3b8">No hay datos de renta fija disponibles o el modelo falló.</div>`;
        return;
      }

      const ns = f.nelson_siegel;
      if (!ns.exito) {
        el.innerHTML = `<div class="card" style="text-align:center;padding:50px;color:#f87171">Error ajustando la curva Nelson-Siegel: ${ns.error}</div>`;
        return;
      }

      const p = ns.parametros;
      const cTeo = ns.curva_teorica;

      el.innerHTML = `
        <div class="g4">
          <div class="mc"><div class="ml">Beta 0 (Nivel)</div><div class="mv">${f3(p.beta0)}</div><div class="ms">Largo Plazo</div></div>
          <div class="mc"><div class="ml">Beta 1 (Pendiente)</div><div class="mv">${f3(p.beta1)}</div><div class="ms">Corto Plazo</div></div>
          <div class="mc"><div class="ml">Beta 2 (Curvatura)</div><div class="mv">${f3(p.beta2)}</div><div class="ms">Medio Plazo</div></div>
          <div class="mc"><div class="ml">Tau (Decaimiento)</div><div class="mv">${f3(p.tau)}</div><div class="ms">Localización</div></div>
        </div>
        <div class="card">
          <div class="ct">Curva de Rendimientos (Treasury Yield Curve) — Ajuste Spline / Nelson-Siegel</div>
          <div style="position:relative;height:350px"><canvas id="c-fixed"></canvas></div>
          <div style="font-size:11px;color:#64748b;margin-top:15px;line-height:1.4">
            <strong>Interpretación:</strong> La línea sólida azul representa el modelo continuo de Nelson-Siegel. 
            Los puntos rojos son las tasas de mercado del Tesoro de EE.UU. (observaciones reales).
            Una curva plana o invertida es una señal clásica de advertencia de contracción económica.
          </div>
        </div>
      `;

      regCh('c-fixed', {
        type: 'line',
        data: {
          labels: cTeo.maduraciones.map(m => m.toFixed(1)),
          datasets: [
            { 
              label: 'Modelo Nelson-Siegel', 
              data: cTeo.tasas.map(t => t * 100), 
              borderColor: '#22d3ee', 
              borderWidth: 3, 
              pointRadius: 0, 
              fill: true,
              backgroundColor: 'rgba(34, 211, 238, 0.05)',
              tension: 0.4 
            },
            { 
              label: 'Puntos Reales (Mercado)', 
              data: f.puntos_reales.map(pt => ({ x: pt.maduracion.toFixed(1), y: pt.tasa * 100 })), 
              type: 'scatter', 
              backgroundColor: '#ef4444', 
              borderColor: '#ffffff',
              borderWidth: 1,
              pointRadius: 6,
              pointHoverRadius: 8
            }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: true, labels: { color: tc } } },
          scales: {
            x: { 
              ...axBase, 
              title: { display: true, text: 'Maduración (Años)', color: tc },
              type: 'category' 
            },
            y: { 
              ...axBase, 
              title: { display: true, text: 'Tasa de Rendimiento (%)', color: tc } 
            }
          }
        }
      });
    }

    /* ══ G. DERIVADOS (Black-Scholes) ═════════════════════ */
    async function loadDeriv() {
      const btn = document.getElementById('btn-deriv-calc');
      btn.innerText = "Calculando..."; btn.disabled = true;
      try {
        const body = {
          S: parseFloat(document.getElementById('bs-s').value),
          K: parseFloat(document.getElementById('bs-k').value),
          T: parseFloat(document.getElementById('bs-t').value) / 365,
          r: parseFloat(document.getElementById('bs-r').value) / 100,
          sigma: parseFloat(document.getElementById('bs-v').value) / 100,
          tipo: document.getElementById('bs-type').value
        };
        const res = await api('/derivados/black-scholes', {}, 'POST', body);
        renderDerivResults(res);
      } catch (e) {
        alert("Error: " + e.message);
      } finally {
        btn.innerText = "Simular Opción"; btn.disabled = false;
      }
    }

    function renderDeriv() {
      const el = document.getElementById('s-deriv');
      el.innerHTML = `
        <div class="card">
          <div class="ct">Calculadora de Opciones Europeas — Black-Scholes-Merton</div>
          <div class="form-panel" style="background:#05080f; margin-bottom:20px">
            <div class="form-grp"><label>Precio (S)</label><input type="number" id="bs-s" class="form-input" value="100"></div>
            <div class="form-grp"><label>Strike (K)</label><input type="number" id="bs-k" class="form-input" value="100"></div>
            <div class="form-grp"><label>Días (T)</label><input type="number" id="bs-t" class="form-input" value="30"></div>
            <div class="form-grp"><label>Tasa % (r)</label><input type="number" id="bs-r" class="form-input" value="5.25" step="0.01"></div>
            <div class="form-grp"><label>Vol % (σ)</label><input type="number" id="bs-v" class="form-input" value="25"></div>
            <div class="form-grp">
              <label>Tipo</label>
              <select id="bs-type" class="form-input" style="font-family:inherit">
                <option value="call">CALL</option>
                <option value="put">PUT</option>
              </select>
            </div>
            <div class="form-grp"><button id="btn-deriv-calc" class="btn-analizar" onclick="loadDeriv()">Simular Opción</button></div>
          </div>
          <div id="bs-results">
            <div style="text-align:center;padding:40px;color:#64748b">Ingrese parámetros y haga clic en Simular.</div>
          </div>
        </div>
      `;
    }

    function renderDerivResults(res) {
      const cont = document.getElementById('bs-results');
      const v = res.valoracion;
      const g = v.griegas;
      const s = res.superficie;

      cont.innerHTML = `
        <div class="g2">
          <div class="mc" style="border-color:#3dd32c">
            <div class="ml" style="color:#3dd32c">Precio Teórico</div>
            <div class="mv" style="color:#3dd32c">$${f2(v.precio)}</div>
            <div class="ms" style="color:#3dd32c">Valor justo del contrato</div>
          </div>
          <div class="g4" style="grid-column: span 1; margin-bottom:0">
            <div class="mc"><div class="ml">Delta</div><div class="mv" style="font-size:18px">${f3(g.delta)}</div></div>
            <div class="mc"><div class="ml">Gamma</div><div class="mv" style="font-size:18px">${f3(g.gamma)}</div></div>
            <div class="mc"><div class="ml">Vega</div><div class="mv" style="font-size:18px">${f3(g.vega)}</div></div>
            <div class="mc"><div class="ml">Theta</div><div class="mv" style="font-size:18px">${f3(g.theta)}</div></div>
          </div>
        </div>
        <div class="card" style="margin-top:20px; background:#05080f">
          <div class="ct">Superficie de Precios (Simulación S vs T)</div>
          <div id="plotly-surface" style="height:500px; width:100%"></div>
        </div>
      `;

      // Plotly 3D Surface
      const data = [{
        z: s.z_precios,
        x: s.x_subyacente,
        y: s.y_tiempo.map(t => Math.round(t * 365)),
        type: 'surface',
        colorscale: 'Viridis',
        showscale: false
      }];

      const layout = {
        paper_bgcolor: 'rgba(0,0,0,0)',
        plot_bgcolor: 'rgba(0,0,0,0)',
        margin: { l: 0, r: 0, b: 0, t: 0 },
        scene: {
          xaxis: { title: 'Precio Subyacente (S)', color: '#94a3b8' },
          yaxis: { title: 'Tiempo (Días)', color: '#94a3b8' },
          zaxis: { title: 'Precio Opción', color: '#94a3b8' },
          camera: { eye: { x: 1.5, y: 1.5, z: 1.2 } }
        }
      };

      Plotly.newPlot('plotly-surface', data, layout);
    }

    /* ══ H. IA PREDICTIVA (Random Forest) ═════════════════ */
    let mlAbortController = null;

    async function runML() {
      const ticker = document.getElementById('ml-ticker').value.toUpperCase();
      const btn = document.getElementById('btn-ml');
      const btnCancel = document.getElementById('btn-ml-cancel');
      const cont = document.getElementById('ml-results');
      
      btn.innerText = "Pensando..."; btn.disabled = true;
      if(btnCancel) { btnCancel.style.display = "inline-block"; }
      cont.innerHTML = '<div style="text-align:center;padding:40px"><div class="spinner"></div>Consultando oráculo de IA...</div>';

      mlAbortController = new AbortController();

      try {
        const res = await api(`/predict/${ticker}`, {}, 'GET', null, mlAbortController.signal);
        if (res.error) throw new Error(res.error);
        
        const sigColor = res.señal.includes('BUY') ? '#3dd32c' : res.señal.includes('SELL') ? '#ef4444' : '#f59e0b';
        
        cont.innerHTML = `
          <div class="g2">
            <div class="card" style="border-left:5px solid ${sigColor}">
              <div class="ct">Predicción del Algoritmo (Próximos 5 días)</div>
              <div style="font-size:32px; font-weight:800; color:${sigColor}; margin-bottom:10px">${res.señal}</div>
              <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px">
                <div class="bar-track" style="height:10px; background:#1e293b"><div class="bar-fill" style="width:${res.confianza * 100}%; background:${sigColor}; height:10px"></div></div>
                <div style="font-family:'JetBrains Mono'; font-weight:700; color:${sigColor}">${pct(res.confianza, 1)}</div>
              </div>
              <div style="font-size:12px; color:#64748b">Confianza del modelo basada en Random Forest Classifier.</div>
            </div>
            <div class="card">
              <div class="ct">Importancia de Variables (Features)</div>
              <div id="ml-imp-cont" style="height:160px; position:relative"></div>
            </div>
          </div>
          <div class="card">
            <div class="ct">Distribución de Probabilidades</div>
            <div class="g3">
              ${Object.entries(res.probabilidades).map(([lab, val]) => `
                <div style="text-align:center; background:#05080f; padding:10px; border-radius:8px">
                  <div style="font-size:10px; color:#64748b; margin-bottom:5px">${lab}</div>
                  <div style="font-size:18px; font-weight:700; color:${lab.includes('BUY') ? '#3dd32c' : lab.includes('SELL') ? '#ef4444' : '#f59e0b'}">${pct(val, 1)}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;

        // Bar Chart para Importancia
        const imp = res.importancia_variables;
        const labels = Object.keys(imp);
        const values = Object.values(imp).map(v => v * 100);

        new Chart(document.createElement('canvas'), {}).destroy(); // Clear hack
        const ctx = document.createElement('canvas');
        document.getElementById('ml-imp-cont').appendChild(ctx);
        
        new Chart(ctx, {
          type: 'bar',
          data: {
            labels,
            datasets: [{ data: values, backgroundColor: '#3b82f6', borderRadius: 4 }]
          },
          options: {
            indexAxis: 'y',
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { ...axBase, title: { display: true, text: 'Importancia %', color: tc } },
              y: { ...axBase }
            }
          }
        });

      } catch (e) {
        if (e.name === 'AbortError') {
          cont.innerHTML = `<div class="card" style="color:#f59e0b; text-align:center; padding:30px">Predicción cancelada por el usuario.</div>`;
        } else {
          cont.innerHTML = `<div class="card" style="color:#ef4444; text-align:center; padding:30px">Error en predicción: ${e.message}</div>`;
        }
      } finally {
        btn.innerText = "Generar Predicción"; btn.disabled = false;
        const btnCancel = document.getElementById('btn-ml-cancel');
        if(btnCancel) { btnCancel.style.display = "none"; }
        mlAbortController = null;
      }
    }

    function cancelML() {
      if (mlAbortController) {
        mlAbortController.abort();
      }
    }

    function renderML() {
      const el = document.getElementById('s-ml');
      const optionsHtml = GLOBAL ? GLOBAL.tickers.map(t => `<option value="${t}">${t}</option>`).join('') : '<option value="AAPL">AAPL</option>';
      
      el.innerHTML = `
        <div class="card">
          <div class="ct">Módulo de Machine Learning — Predicción de Tendencia</div>
          <div class="form-panel" style="background:#05080f; margin-bottom:20px; max-width:500px">
            <div class="form-grp" style="flex:1">
              <label>Ticker a Predecir</label>
              <select id="ml-ticker" class="form-input" style="font-family:inherit">
                ${optionsHtml}
              </select>
            </div>
            <div class="form-grp" style="display:flex; gap:10px; align-items:flex-end">
              <button id="btn-ml" class="btn-analizar" style="background:#a78bfa; color:#05080f" onclick="runPrediction()">Generar Predicción</button>
              <button id="btn-ml-cancel" class="btn-analizar" style="background:transparent; border:1px solid #ef4444; color:#ef4444; display:none" onclick="cancelPrediction()">Cancelar</button>
            </div>
          </div>
          <div id="ml-results">
            <div style="text-align:center;padding:40px;color:#64748b">Seleccione un activo para ver la proyección de la IA.</div>
          </div>
        </div>
      `;
    }

    // Proxy para que el onclick del HTML funcione con la función definida dentro de renderML
    window.runPrediction = runML;
    window.cancelPrediction = cancelML;
    window.renderFixed = renderFixed;
    window.renderDeriv = renderDeriv;
    window.renderML = renderML;
    window.loadDeriv = loadDeriv;

  </script>
</body>

</html>
